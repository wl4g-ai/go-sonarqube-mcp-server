version: "3.8"
services:
  sonarqube-postgres:
    image: registry.cn-shenzhen.aliyuncs.com/wl4g/bitnami_postgresql:18.3-vmware-photon-5.0
    container_name: sonarqube-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.5", memory: "2G" }
        reservations: { cpus: "0.5", memory: "512M" }
    environment:
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_PORT_NUMBER=5432
      - POSTGRESQL_USERNAME=sonarqube
      - POSTGRESQL_PASSWORD=sonarqube
      - POSTGRESQL_DATABASE=sonarqube
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_WAL_LEVEL=replica
      - POSTGRESQL_STATEMENT_TIMEOUT=60000
      - POSTGRESQL_USERNAME_CONNECTION_LIMIT=100
      - POSTGRESQL_POSTGRES_CONNECTION_LIMIT=100
      - POSTGRESQL_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
    ports:
      - "35432:5432"
    networks:
      - sonarqube-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - sonarqube_postgres_data:/bitnami/postgresql
  sonarqube:
    # issue:https://github.com/docker/for-mac/issues/7410
    image: registry.cn-shenzhen.aliyuncs.com/wl4g/sonarqube:26.4.0.121862-community-amd64 # 26.4.0.121862-community-amd64
    container_name: sonarqube
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.5", memory: "4G" }
        reservations: { cpus: "0.5", memory: "2G" }
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
      SONAR_WEB_PORT: 9000
      SONAR_ES_JAVA_OPTS: "-Xms512m -Xmx512m -Dlog4j2.formatMsgNoLookups=true"
      SONAR_FORCE_AUTHENTICATION: "false"
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    security_opt:
      - seccomp:unconfined
    ports:
      - "9000:9000"
    networks:
      - sonarqube-net
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      sonarqube-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/api/system/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    volumes:
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_data:/opt/sonarqube/data
  # Auto-reset admin password to fixed value on first startup.
  # Uses SonarQube REST API: POST /api/users/change_password
  sonarqube-init:
    image: registry.cn-shenzhen.aliyuncs.com/wl4g/alpine:3.21
    container_name: sonarqube-init
    depends_on:
      sonarqube:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo ">> Resetting SonarQube admin password..."
        STATUS=""
        for i in $(seq 1 30); do
          STATUS=$(wget -qO- --post-data="" http://sonarqube:9000/api/system/status 2>/dev/null || echo "")
          if echo "$STATUS" | grep -q '"UP"'; then break; fi
          echo "  waiting for SonarQube API... ($i)"
          sleep 5
        done
        # Change admin password via API
        curl -s -u admin:admin -X POST \
          "http://sonarqube:9000/api/users/change_password?login=admin&password=Abcd1234@sonar&previousPassword=admin" \
          || echo "WARN: Password may already be set (non-default)"
        echo ">> SonarQube init done. Admin password: Abcd1234@sonar"
    networks:
      - sonarqube-net
networks:
  sonarqube-net:
    driver: bridge
volumes:
  sonarqube_postgres_data:
    name: sonarqube_postgres_data
  sonarqube_extensions:
    name: sonarqube_extensions
  sonarqube_logs:
    name: sonarqube_logs
  sonarqube_data:
    name: sonarqube_data
